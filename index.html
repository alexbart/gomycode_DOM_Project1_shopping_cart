<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Shopping Cart</title>
  </head>
  <body class="bg-gray-100 min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow p-4">
      <nav class="container mx-auto flex justify-between items-center">
        <a href="#" class="text-xl font-bold">Shopping Cart</a>
        <div class="flex gap-4">
          <a href="#" class="text-gray-700 hover:text-blue-600">Home</a>
          <a href="#" class="text-gray-700 hover:text-blue-600">Products</a>
          <a href="#" class="text-gray-700 hover:text-blue-600">Contact</a>
        </div>
      </nav>
    </header>

    <!-- Main Shopping Cart -->
    <main class="container mx-auto py-8 px-4">
      <!-- Total Price -->
      <div class="mb-6 text-right text-xl font-bold">
        Total Price: <span class="total-price">0 $</span>
      </div>

      <!-- Products List -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <!-- Product 1 -->
        <div class="card bg-white shadow-md rounded-lg p-4 flex flex-col items-center">
          <img src="/assets/baskets.png" alt="Baskets" class="w-32 mb-4" />
          <h5 class="text-lg font-bold">Baskets</h5>
          <p class="text-gray-600 mb-2">This is a basket</p>
          <h4 class="unit-price font-semibold mb-2">100 $</h4>
          
          <!-- Quantity Controls -->
          <div class="flex items-center gap-4 mb-2">
            <button class="plus text-green-500 text-2xl"><i class="fas fa-plus-circle"></i></button>
            <span class="quantity">0</span>
            <button class="minus text-red-500 text-2xl"><i class="fas fa-minus-circle"></i></button>
          </div>

          <!-- Actions -->
          <div class="flex gap-4">
            <button class="delete text-gray-500 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
            <button class="like text-gray-500 hover:text-pink-500"><i class="fas fa-heart"></i></button>
          </div>
        </div>

        <!-- Product 2 -->
        <div class="card bg-white shadow-md rounded-lg p-4 flex flex-col items-center">
          <img src="/assets/socks.png" alt="Socks" class="w-32 mb-4" />
          <h5 class="text-lg font-bold">Socks</h5>
          <p class="text-gray-600 mb-2">This is a pair of socks</p>
          <h4 class="unit-price font-semibold mb-2">20 $</h4>
          <div class="flex items-center gap-4 mb-2">
            <button class="plus text-green-500 text-2xl"><i class="fas fa-plus-circle"></i></button>
            <span class="quantity">0</span>
            <button class="minus text-red-500 text-2xl"><i class="fas fa-minus-circle"></i></button>
          </div>
          <div class="flex gap-4">
            <button class="delete text-gray-500 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
            <button class="like text-gray-500 hover:text-pink-500"><i class="fas fa-heart"></i></button>
          </div>
        </div>

        <!-- Product 3 -->
        <div class="card bg-white shadow-md rounded-lg p-4 flex flex-col items-center">
          <img src="/assets/bag.png" alt="Bag" class="w-32 mb-4" />
          <h5 class="text-lg font-bold">Bag</h5>
          <p class="text-gray-600 mb-2">This is a bag</p>
          <h4 class="unit-price font-semibold mb-2">50 $</h4>
          <div class="flex items-center gap-4 mb-2">
            <button class="plus text-green-500 text-2xl"><i class="fas fa-plus-circle"></i></button>
            <span class="quantity">0</span>
            <button class="minus text-red-500 text-2xl"><i class="fas fa-minus-circle"></i></button>
          </div>
          <div class="flex gap-4">
            <button class="delete text-gray-500 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
            <button class="like text-gray-500 hover:text-pink-500"><i class="fas fa-heart"></i></button>
          </div>
        </div>

      </div>
    </main>

    <footer class="bg-white text-center py-4 shadow mt-8">
      &copy; 2026 Alex Kiprop
    </footer>

    <!-- Font Awesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/js/all.min.js"></script>
    <!-- Custom JS -->
    <script src="/js/script.js"></script>
  </body>
</html>
